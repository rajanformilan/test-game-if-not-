<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pro FPS Setup</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* Matching the UI from your screenshot */
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; border: 2px solid white; border-radius: 50%; pointer-events: auto; }
        #fireButton { position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; background: red; border-radius: 50%; pointer-events: auto; color: white; border: 4px solid white; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="joystick"></div>
        <button id="fireButton">FIRE</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

        class ProGame {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({canvas: document.getElementById('gameCanvas'), antialias: true});
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                
                this.setupEnvironment();
                this.loadGun();
                this.animate();
            }

            setupEnvironment() {
                // Add lights to make it look professional
                this.scene.add(new THREE.AmbientLight(0x404040, 2));
                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(10, 10, 10);
                this.scene.add(dirLight);
            }

            loadGun() {
                const loader = new GLTFLoader();
                loader.load('gun.glb', (gltf) => {
                    this.gun = gltf.scene;
                    // Position it relative to the camera (first-person view)
                    this.gun.position.set(0.3, -0.3, -0.6);
                    this.gun.rotation.y = Math.PI;
                    this.camera.add(this.gun); // Parent to camera
                });
                this.scene.add(this.camera);
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                this.renderer.render(this.scene, this.camera);
            }
        }
        new ProGame();
    </script>
</body>
</html>
